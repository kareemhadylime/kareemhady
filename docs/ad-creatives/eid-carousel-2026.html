<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beithady — Eid Campaign 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:#f0f2f5;font-family:'Cairo',sans-serif}
button{cursor:pointer;border:none;background:none}

/* app layout */
.app-root{min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}

/* header */
.header{width:100%;max-width:640px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:12px 18px;background:#fff;border-radius:12px;box-shadow:0 2px 14px rgba(0,52,98,.09)}
.platform-toggle{display:flex;gap:6px}
.toggle-btn{padding:5px 14px;border-radius:20px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;color:#6077a6;background:#eae9f3;transition:all .2s}
.toggle-btn.active{background:#003462;color:#fff}
.toggle-btn:hover:not(.active){background:#d8d6ea}

/* carousel area */
.carousel-area{display:flex;align-items:center;gap:16px}
.nav-arrow{width:40px;height:40px;border-radius:50%;background:#fff;box-shadow:0 2px 12px rgba(0,52,98,.14);font-size:24px;color:#003462;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;line-height:1}
.nav-arrow:hover{background:#003462;color:#fff;transform:scale(1.06)}

/* phone frame */
.phone-frame{background:#fff;border-radius:30px;box-shadow:0 10px 50px rgba(0,0,0,.18),0 0 0 1.5px rgba(0,52,98,.1);overflow:hidden;display:flex;flex-direction:column;align-items:center;padding-bottom:16px}
.phone-notch{width:60px;height:5px;background:#ddd;border-radius:3px;margin:8px auto 4px}
.ig-header{width:100%;display:flex;align-items:center;gap:9px;padding:7px 14px 5px}
.ig-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#003462);flex-shrink:0}

/* slide */
.slide-viewport{overflow:hidden;transition:opacity .18s ease;flex-shrink:0;position:relative}
.slide-viewport.fading{opacity:0}

/* dots */
.carousel-dots{display:flex;gap:5px;margin-top:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:all .2s;cursor:pointer}
.dot.active{background:#003462;width:18px;border-radius:3px}

/* ig actions */
.ig-actions{width:100%;display:flex;align-items:center;gap:12px;padding:8px 14px 2px}

/* slide info */
.slide-info{display:flex;align-items:center;gap:4px;margin:14px 0 16px}
.slide-counter{font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:#C9A84C;background:#003462;padding:2px 10px;border-radius:12px}
.dim-label{font-family:'Cairo',sans-serif;font-size:10px;color:#bbb;margin-left:10px;letter-spacing:.5px}

/* thumbnails */
.thumbnails{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:580px}
.thumb-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px;border-radius:10px;border:2px solid transparent;background:#fff;transition:all .18s;box-shadow:0 1px 6px rgba(0,52,98,.08);width:98px;overflow:hidden}
.thumb-btn:hover{border-color:#6077a6}
.thumb-btn.active{border-color:#003462;box-shadow:0 2px 14px rgba(0,52,98,.2)}
.thumb-label{font-family:'Cairo',sans-serif;font-size:9.5px;font-weight:700;color:#003462;text-align:center;margin-top:2px}
.thumb-inner{width:82px;height:82px;border-radius:5px;overflow:hidden;position:relative;flex-shrink:0}

/* animations */
@keyframes crescentPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}50%{filter:drop-shadow(0 0 28px rgba(201,168,76,.9))}}
.crescent-glow{animation:crescentPulse 2.8s ease-in-out infinite}
@keyframes sparklePop{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(2)}}
.sparkle{animation:sparklePop 2s ease-in-out infinite;border-radius:50%}

/* slide contents */
.slide-inner{position:relative;width:100%;height:100%;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const NAVY = '#003462';
const GOLD = '#C9A84C';
const PERIWINKLE = '#6077a6';
const LAVENDER = '#eae9f3';

function starPoints(cx, cy, r, pts, inner) {
  const p = [];
  for (let i = 0; i < pts * 2; i++) {
    const a = (i * Math.PI) / pts - Math.PI / 2;
    const rad = i % 2 === 0 ? r : inner;
    p.push(`${cx + rad * Math.cos(a)},${cy + rad * Math.sin(a)}`);
  }
  return p.join(' ');
}

function GeometricBg({ opacity = 0.12, color = GOLD }) {
  return (
    <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', opacity, pointerEvents: 'none' }}>
      <defs>
        <pattern id={`ig${Math.floor(opacity*100)}`} x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
          <polygon points={starPoints(40,40,28,8,12)} fill="none" stroke={color} strokeWidth="0.7"/>
          <line x1="0" y1="0" x2="40" y2="40" stroke={color} strokeWidth="0.35"/>
          <line x1="80" y1="0" x2="40" y2="40" stroke={color} strokeWidth="0.35"/>
          <line x1="0" y1="80" x2="40" y2="40" stroke={color} strokeWidth="0.35"/>
          <line x1="80" y1="80" x2="40" y2="40" stroke={color} strokeWidth="0.35"/>
          <line x1="40" y1="0" x2="40" y2="80" stroke={color} strokeWidth="0.35"/>
          <line x1="0" y1="40" x2="80" y2="40" stroke={color} strokeWidth="0.35"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill={`url(#ig${Math.floor(opacity*100)})`}/>
    </svg>
  );
}

function LogoMark({ light = true, size = 38 }) {
  const c = light ? '#fff' : NAVY;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>

}

function Crescent() {

      <polygon points={starPoints(108,46,15,5,6)} fill={GOLD}/>
    </svg>
  );
}

function CornerOrnament({ pos }) {
  const rots = { tl: '0 0 0', tr: '90 30 30', bl: '270 30 30', br: '180 30 30' };
  return (
    <svg width="60" height="60" viewBox="0 0 60 60" style={{ opacity: 0.88 }}>
      <g transform={`rotate(${rots[pos]})`}>
        <line x1="2" y1="2" x2="52" y2="2" stroke={GOLD} strokeWidth="1.5"/>
        <line x1="2" y1="2" x2="2" y2="52" stroke={GOLD} strokeWidth="1.5"/>
        <polygon points={starPoints(9,9,7,8,3)} fill={GOLD}/>
      </g>
    </svg>
  );
}

/* ═══════ MAIN APP ═══════ */
const SLIDES = [
  { component: Slide1, label: 'Eid Greeting', ar: 'تحية العيد' },
  { component: Slide2, label: 'Your Home', ar: 'منزلكم' },
  { component: Slide3, label: 'Services', ar: 'خدماتنا' },
  { component: Slide4, label: 'Book Now', ar: 'احجز الآن' },
];

function App() {
  const [active, setActive] = useState(0);
  const [isStories, setIsStories] = useState(false);
  const [fading, setFading] = useState(false);

  const go = (dir) => {
    setFading(true);
    setTimeout(() => {
      setActive(prev => dir === 'next' ? (prev + 1) % SLIDES.length : (prev - 1 + SLIDES.length) % SLIDES.length);
      setFading(false);
    }, 160);
  };

  useEffect(() => {
    const h = (e) => {
      if (e.key === 'ArrowRight') go('next');
      if (e.key === 'ArrowLeft') go('prev');
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  });

  const W = isStories ? 258 : 385;
  const H = isStories ? 458 : 385;
  const SlideComp = SLIDES[active].component;

  return (
    <div className="app-root">
      {/* header */}
      <div className="header">
        <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
          <span style={{ fontFamily:'Cairo,sans-serif', fontWeight:800, color:NAVY, fontSize:17 }}>بيت هادي — Beit Hady</span>
          <span style={{ fontFamily:'Cairo,sans-serif', color:PERIWINKLE, fontSize:11 }}>Eid Al-Adha Campaign 2026 · Gulf States</span>
        </div>
        <div className="platform-toggle">
          <button className={`toggle-btn ${!isStories ? 'active' : ''}`} onClick={() => setIsStories(false)}>⬛ Feed 1:1</button>
          <button className={`toggle-btn ${isStories ? 'active' : ''}`} onClick={() => setIsStories(true)}>⬜ Stories 9:16</button>
        </div>
      </div>

      {/* carousel */}
      <div className="carousel-area">
        <button className="nav-arrow" onClick={() => go('prev')}>‹</button>

        <div className="phone-frame" style={{ width: W + 28, minHeight: H + 116 }}>
          <div className="phone-notch"/>
          {/* ig top bar */}
          <div className="ig-header">
            <div className="ig-avatar"/>
            <div>
              <div style={{ fontFamily:'Cairo,sans-serif', fontWeight:700, fontSize:12, color:'#111' }}>beithady</div>
              <div style={{ fontFamily:'Cairo,sans-serif', fontSize:10, color:'#999' }}>Sponsored</div>
            </div>
            <div style={{ marginLeft:'auto', fontSize:16, color:'#999', letterSpacing:2 }}>•••</div>
          </div>

          {/* slide */}
          <div className={`slide-viewport ${fading ? 'fading' : ''}`} style={{ width: W, height: H }}>
            <SlideComp/>
          </div>

          {/* dots */}
          <div className="carousel-dots">
            {SLIDES.map((_, i) => (
              <button key={i} className={`dot ${i === active ? 'active' : ''}`} onClick={() => setActive(i)}/>
            ))}
          </div>

          {/* actions */}
          <div className="ig-actions">
            <span style={{ fontSize:20 }}>🤍</span>
            <span style={{ fontSize:20 }}>💬</span>
            <span style={{ fontSize:20 }}>📤</span>
            <span style={{ marginLeft:'auto', fontSize:20 }}>🔖</span>
          </div>
        </div>

        <button className="nav-arrow" onClick={() => go('next')}>›</button>
      </div>

      {/* slide info */}
      <div className="slide-info">
        <span className="slide-counter">{active + 1} / {SLIDES.length}</span>
        <span style={{ fontFamily:'Cairo,sans-serif', fontWeight:700, fontSize:13, color:NAVY, marginLeft:10 }}>{SLIDES[active].label}</span>
        <span style={{ fontFamily:'Cairo,sans-serif', fontSize:12, color:PERIWINKLE, marginLeft:5, direction:'rtl' }}>— {SLIDES[active].ar}</span>
        <span className="dim-label">{isStories ? '1080 × 1920 px' : '1080 × 1080 px'}</span>
      </div>

      {/* thumbnails */}
      <div className="thumbnails">
        {SLIDES.map((s, i) => {
          const ThumbComp = s.component;
          return (
            <button key={i} className={`thumb-btn ${i === active ? 'active' : ''}`} onClick={() => setActive(i)}>
              <div className="thumb-inner">
                <div style={{ transform:'scale(0.213)', transformOrigin:'top left', width:385, height:385, pointerEvents:'none' }}>
                  <ThumbComp/>
                </div>
              </div>
              <div className="thumb-label">{i + 1}. {s.label}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
