<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Offline — Lime Boat Rental</title>
<link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0891b2">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Inter, Roboto, sans-serif;
    color: #0f172a;
    background:
      radial-gradient(800px 500px at 0% 0%, rgba(6, 182, 212, 0.10), transparent 60%),
      radial-gradient(800px 500px at 100% 100%, rgba(13, 148, 136, 0.10), transparent 60%),
      linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e2e8f0; background: #0f172a; }
    .card { background: #1e293b !important; border-color: #334155 !important; }
    .muted { color: #94a3b8 !important; }
  }
  .card {
    max-width: 420px;
    width: 100%;
    padding: 32px 28px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    text-align: center;
  }
  .icon-box {
    width: 72px;
    height: 72px;
    margin: 0 auto 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 18px;
    background: linear-gradient(135deg, #06b6d4, #0d9488);
    color: white;
  }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  p  { margin: 0 0 8px; font-size: 14px; line-height: 1.5; }
  .muted { color: #64748b; }
  .btn {
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 18px;
    border-radius: 10px;
    background: #0891b2;
    color: white;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    transition: background 120ms ease;
    cursor: pointer;
    border: none;
  }
  .btn:hover { background: #0e7490; }
  ul { text-align: left; padding-left: 20px; margin: 12px 0 0; font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<main class="card">
  <div class="icon-box">
    <svg width="40" height="40" viewBox="0 0 64 64" fill="none">
      <path d="M 12 32 L 52 32 L 46 42 L 18 42 Z" fill="white"/>
      <rect x="24" y="24" width="16" height="8" rx="1.5" fill="white"/>
      <rect x="31" y="14" width="2" height="10" fill="white"/>
      <path d="M 33 16 L 41 19 L 33 22 Z" fill="white"/>
      <path d="M 10 50 Q 32 56 54 50" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p class="muted">This page hasn't been cached yet, so we can't show it without a connection.</p>
  <p class="muted">If you have any saved work (a Mark-Paid action, for example), it'll send automatically once you're back online.</p>
  <ul class="muted">
    <li>Your last viewed bookings stay readable</li>
    <li>Queued actions sync when connectivity returns</li>
  </ul>
  <button class="btn" onclick="location.reload()">Try again</button>
</main>
</body>
</html>
